version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: velaris-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velaris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-velaris_password}
      POSTGRES_DB: ${POSTGRES_DB:-velaris_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-velaris}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: velaris-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: velaris-api
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://velaris:velaris_password@postgres:5432/velaris_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - CLIENT_CONFIG_PATH=/app/client-config.yaml
    ports:
      - "8000:8000"
    volumes:
      - ../../client-config.example.yaml:/app/client-config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: velaris-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
